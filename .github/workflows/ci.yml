name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  shellcheck:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install shellcheck
        run: sudo apt-get update && sudo apt-get install -y shellcheck
      - name: Lint
        run: shellcheck -S warning scripts/interdimux.sh interdimux.tmux tests/*.sh

  tests:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y tmux fzf fd-find
      - name: Check fzf version
        run: fzf --version
      - name: Run tests
        run: |
          for t in tests/test_*.sh; do
            echo "=== $t"
            bash "$t"
          done
